<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" aria-label="Hyperliquid USA home">

      <span>Hyperliquid USA</span>

    <nav class="nav" aria-label="Trusted references">

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Hyperliquid USA</h1>
      <p class="sub"><strong>Hyperliquid USA</strong> is the page for reaching the Hyperliquid perpetuals DEX from your own wallet.</p>
    </section>

    <section class="trade-card" aria-label="Trade route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">-&gt;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="hype.png" width="28" height="28" alt="HYPE">
            <span>HYPE</span>
          </span>
        </div>
      </div>

    </section>
  </main>

  <footer class="foot">Hyperliquid USA &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
