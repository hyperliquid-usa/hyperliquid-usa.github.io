<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hyperliquid USA - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Hyperliquid USA DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://hyperliquid-usa.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f6f7f5;
  --surface: #ffffff;
  --surface-soft: #f1f4f2;
  --ink: #111716;
  --muted: #66706d;
  --faint: #97a09c;
  --line: rgba(17, 23, 22, 0.1);
  --line-strong: rgba(17, 23, 22, 0.16);
  --accent: #1FB3A3;
  --accent-dark: #168f82;
  --accent-soft: rgba(31, 179, 163, 0.12);
  --shadow: 0 28px 70px -38px rgba(17, 23, 22, 0.36);
  --max: 1100px;
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  min-height: 100dvh;
  margin: 0;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 50% -18%, rgba(31, 179, 163, 0.15), transparent 42%),
    linear-gradient(180deg, #fbfbf9 0%, var(--bg) 62%, #eef2ef 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

.topbar {
  width: min(var(--max), calc(100% - 32px));
  min-height: 70px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 22px;
  flex: 0 0 auto;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-size: 1rem;
  font-weight: 750;
  white-space: nowrap;
}

.brand img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid var(--line);
}

.nav {
  display: flex;
  align-items: center;
  gap: 22px;
}

.nav a {
  font-size: 0.92rem;
  font-weight: 550;
  color: var(--muted);
}

.nav a:hover {
  color: var(--ink);
}

.spacer {
  flex: 1;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 16px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.54);
  color: var(--ink);
  font-size: 0.9rem;
  font-weight: 700;
  box-shadow: 0 10px 28px -24px rgba(17, 23, 22, 0.55);
}

.ghost:hover {
  border-color: rgba(31, 179, 163, 0.46);
  color: var(--accent-dark);
}

.stage {
  width: min(var(--max), calc(100% - 32px));
  margin: 0 auto;
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(22px, 4vh, 34px);
  padding: 8px 0 12px;
  text-align: center;
}

.hero {
  display: grid;
  justify-items: center;
  gap: 14px;
}

h1,
p {
  margin: 0;
}

h1 {
  max-width: 12ch;
  font-size: clamp(2.55rem, 8vw, 4.65rem);
  line-height: 1.02;
  font-weight: 800;
  letter-spacing: 0;
}

.sub {
  max-width: 64ch;
  color: var(--muted);
  font-size: clamp(1rem, 1.65vw, 1.17rem);
}

.sub strong {
  color: var(--ink);
  font-weight: 800;
  background: linear-gradient(180deg, transparent 58%, var(--accent-soft) 0);
}

.trade-card {
  width: min(560px, 100%);
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.86);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.route {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr);
  gap: 12px;
  align-items: center;
}

.leg {
  min-width: 0;
  display: grid;
  gap: 9px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-soft);
  text-align: left;
}

.label {
  color: var(--faint);
  font-size: 0.72rem;
  font-weight: 800;
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: 0;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  color: var(--ink);
  font-size: 1.1rem;
  font-weight: 800;
  line-height: 1.2;
}

.chip img {
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
  border-radius: 50%;
}

.switch {
  width: 44px;
  height: 44px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: grid;
  place-items: center;
  font: inherit;
  font-weight: 800;
  box-shadow: 0 12px 28px -24px rgba(17, 23, 22, 0.6);
}

.switch:hover {
  color: var(--accent-dark);
  border-color: rgba(31, 179, 163, 0.46);
  background: var(--accent-soft);
}

.primary {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 54px;
  width: 100%;
  margin-top: 14px;
  border-radius: 8px;
  background: var(--accent);
  color: #ffffff;
  font-size: 1.05rem;
  font-weight: 800;
  box-shadow: 0 18px 36px -22px rgba(31, 179, 163, 0.75);
}

.primary:hover {
  background: var(--accent-dark);
}

.foot {
  flex: 0 0 auto;
  min-height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px 12px;
  color: var(--faint);
  font-size: 0.86rem;
  font-weight: 650;
}

@media (max-width: 720px) {
  .topbar {
    width: calc(100% - 28px);
    min-height: 64px;
    gap: 12px;
  }

  .nav {
    display: none;
  }

  .brand {
    font-size: 0.95rem;
  }

  .ghost {
    min-height: 36px;
    padding: 0 12px;
    font-size: 0.86rem;
  }

  .stage {
    width: calc(100% - 28px);
    gap: 22px;
    padding: 2px 0 8px;
  }

  .hero {
    gap: 12px;
  }

  h1 {
    font-size: 2.58rem;
  }

  .sub {
    max-width: 31ch;
    font-size: 0.99rem;
    line-height: 1.45;
  }

  .trade-card {
    width: min(100%, 328px);
    padding: 14px;
  }

  .route {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .leg {
    padding: 13px;
  }

  .switch {
    justify-self: center;
    width: 40px;
    height: 40px;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 52px;
    margin-top: 12px;
  }

  .foot {
    min-height: 44px;
    padding-bottom: 10px;
    font-size: 0.82rem;
  }
}

@media (max-height: 680px) {
  .topbar {
    min-height: 58px;
  }

  .stage {
    gap: 18px;
  }

  .hero {
    gap: 10px;
  }

  h1 {
    font-size: clamp(2.2rem, 7vw, 3.6rem);
  }

  .trade-card {
    padding: 14px;
  }

  .leg {
    padding: 12px;
  }

  .primary {
    min-height: 48px;
  }

  .foot {
    min-height: 40px;
    padding-bottom: 8px;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Hyperliquid USA</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Hyperliquid USA</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Hyperliquid USA &mdash; 2026</footer>
</body>
</html>
